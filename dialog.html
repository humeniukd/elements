<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet">
    <title>dialog</title>
  </head>
  <body>
  <div class="grid h-125 place-content-center bg-white dark:bg-gray-900 dark:scheme-dark">
    <button command="show-modal" commandfor="dialog" class="rounded-md bg-gray-950/5 px-2.5 py-1.5 text-sm font-semibold text-gray-900 transition-all duration-300 hover:bg-gray-950/10 in-has-open:opacity-0 dark:bg-white/10 dark:text-white dark:inset-ring dark:inset-ring-white/5 dark:hover:bg-white/20" aria-expanded="true">Open dialog</button>
    <el-dialog open="true">
      <dialog id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent" style="right: var(--el-top-layer-scrollbar-offset, 0px);" open="">
        <el-dialog-backdrop class="fixed inset-0 bg-gray-500/75 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in dark:bg-gray-900/50" inert=""></el-dialog-backdrop>

        <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
          <el-dialog-panel class="relative transform overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-sm sm:p-6 data-closed:sm:translate-y-0 data-closed:sm:scale-95 dark:bg-gray-800 dark:outline dark:-outline-offset-1 dark:outline-white/10">
            <div>
              <div class="mx-auto flex size-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-500/10">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 text-green-600 dark:text-green-400">
                  <path d="m4.5 12.75 6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </div>
              <div class="mt-3 text-center sm:mt-5">
                <h3 id="dialog-title" class="text-base font-semibold text-gray-900 dark:text-white">Payment successful</h3>
                <div class="mt-2">
                  <p class="text-sm text-gray-500 dark:text-gray-400">Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequatur amet labore.</p>
                </div>
              </div>
            </div>
            <div class="mt-5 sm:mt-6">
              <button type="button" command="close" commandfor="dialog" class="inline-flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500" aria-expanded="true">Go back to dashboard</button>
            </div>
          </el-dialog-panel>
        </div>
      </dialog>
    </el-dialog>
  </div>
  <script>
    {
      function onReady() {
        for (let elDialog of document.querySelectorAll('el-dialog')) {
          let dialog = elDialog.querySelector('dialog')

          // Mark dialog as inert to prevent focus from moving inside
          dialog.inert = true

          dialog.addEventListener(
                  'beforetoggle',
                  (evt) => {
                    if (evt.newState !== 'open') return

                    // Fire normal events for initial value on focus if any
                    for (let element of dialog.querySelectorAll('[data-initial-value-on-focus]')) {
                      let value = element.getAttribute('data-initial-value-on-focus')
                      element.removeAttribute('data-initial-value-on-focus')
                      element.value = value
                      element.dispatchEvent(new Event('input'))
                    }

                    // Then, after all events have been processed, allow focusing
                    setTimeout(() => {
                      dialog.inert = false
                    }, 0)
                  },
                  { once: true },
          )

          // Now we can open the dialog
          elDialog.open = true
        }
      }
      if (customElements.get('el-dialog')) {
        onReady()
      } else {
        window.addEventListener('elements:ready', onReady)
      }
    }
  </script>
  <script type="module" src="/src/main.js"></script>
  </body>
</html>
